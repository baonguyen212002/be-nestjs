name: Deploy to WSL

on:
  push:
    branches: [main]

# Don't let two deploys run at once (a later push waits for the current one).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/kenzings/shop/be-nestjs
    steps:
      - name: Pull latest code
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restart app (pm2)
        run: |
          pm2 restart shop-api --update-env \
            || pm2 start dist/main.js --name shop-api
